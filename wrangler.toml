name = "cornermash"
compatibility_date = "2024-09-23"
pages_build_output_dir = "./"

# This is how the Pages functions access the DO:
# env.RATINGS_DO → resolves to the cornermash-do worker's RatingsDO class.
# The script_name is the link that connects them.
[[durable_objects.bindings]]
name = "RATINGS_DO"
class_name = "RatingsDO"
script_name = "cornermash-do"

# NO migrations block here. Migrations live in the DO worker's
# wrangler.toml, NOT the Pages one. (Pages ignores them and errors
# out if you include them.)