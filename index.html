<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CornerMash</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Loading screen: shown until app.js hides it. Safe even if JS fails. -->
  <div id="loading" class="loading-screen" role="status" aria-live="polite">
  Initializing<span class="loading-dots"><span>.</span><span>.</span><span>.</span></span>
  </div>

  <main class="app">
    <header class="hero">
      <h1>CornerMash</h1>
      <p class="subtitle">Pick the stronger cornerstone.</p>
    </header>

    <section class="matchup" id="matchup">
      <button class="cs-card" id="cs-a" type="button">
        <div class="cs-image-wrap">
          <img id="cs-a-img" alt="" />
        </div>
        <div class="cs-info">
          <span class="cs-rarity" id="cs-a-rarity"></span>
          <h2 id="cs-a-name"></h2>
          <p id="cs-a-desc"></p>
        </div>
        <span class="key-hint" aria-hidden="true">←</span>
      </button>

      <div class="vs" aria-hidden="true">VS</div>

      <button class="cs-card" id="cs-b" type="button">
        <div class="cs-image-wrap">
          <img id="cs-b-img" alt="" />
        </div>
        <div class="cs-info">
          <span class="cs-rarity" id="cs-b-rarity"></span>
          <h2 id="cs-b-name"></h2>
          <p id="cs-b-desc"></p>
        </div>
        <span class="key-hint key-hint-right" aria-hidden="true">→</span>
      </button>
    </section>

    <section class="controls">
      <button id="rankings-btn" class="rankings-btn" type="button">Show Rankings</button>
      <div class="stats">
        <div class="stats-count">Votes cast: <span id="vote-count">0</span></div>
        <div class="vote-progress">
  <div class="vote-progress-track">
    <div class="vote-progress-fill" id="vote-progress-fill"></div>
    <div class="vote-progress-marker" data-threshold="500"  style="left: 10%">
      <div class="vote-progress-star">★</div>
      <div class="vote-progress-tick"></div>
      <div class="vote-progress-label">500</div>
    </div>
    <div class="vote-progress-marker" data-threshold="1000" style="left: 20%">
      <div class="vote-progress-star">★</div>
      <div class="vote-progress-tick"></div>
      <div class="vote-progress-label">1,000</div>
    </div>
    <div class="vote-progress-marker" data-threshold="1500" style="left: 30%">
      <div class="vote-progress-star">★</div>
      <div class="vote-progress-tick"></div>
      <div class="vote-progress-label">1,500</div>
    </div>
    <div class="vote-progress-marker" data-threshold="2000" style="left: 40%">
      <div class="vote-progress-star">★</div>
      <div class="vote-progress-tick"></div>
      <div class="vote-progress-label">2,000</div>
    </div>
    <div class="vote-progress-marker" data-threshold="3000" style="left: 60%">
      <div class="vote-progress-star">★</div>
      <div class="vote-progress-tick"></div>
      <div class="vote-progress-label">3,000</div>
    </div>
    <div class="vote-progress-marker" data-threshold="4000" style="left: 80%">
      <div class="vote-progress-star">★</div>
      <div class="vote-progress-tick"></div>
      <div class="vote-progress-label">4,000</div>
    </div>
    <div class="vote-progress-marker" data-threshold="5000" style="left: 100%">
      <div class="vote-progress-star">★</div>
      <div class="vote-progress-tick"></div>
      <div class="vote-progress-label">5,000</div>
    </div>
    <div class="vote-progress-marker milestone-late" data-threshold="5000" style="left: 25%">
      <div class="vote-progress-star">★</div>
      <div class="vote-progress-tick"></div>
      <div class="vote-progress-label">5,000</div>
    </div>
    <div class="vote-progress-marker milestone-late" data-threshold="7500"  style="left: 37.5%">
      <div class="vote-progress-star">★</div>
      <div class="vote-progress-tick"></div>
      <div class="vote-progress-label">7,500</div>
    </div>
    <div class="vote-progress-marker milestone-late" data-threshold="10000" style="left: 50%">
      <div class="vote-progress-star">★</div>
      <div class="vote-progress-tick"></div>
      <div class="vote-progress-label">10,000</div>
    </div>
    <div class="vote-progress-marker milestone-late" data-threshold="15000" style="left: 75%">
      <div class="vote-progress-star">★</div>
      <div class="vote-progress-tick"></div>
      <div class="vote-progress-label">15,000</div>
    </div>
    <div class="vote-progress-marker milestone-late" data-threshold="20000" style="left: 100%">
      <div class="vote-progress-star">★</div>
      <div class="vote-progress-tick"></div>
      <div class="vote-progress-label">20,000</div>
    </div>
    </div>
  </div>
</div>
      </div>
    </section>

    <div class="modal" id="rankings-modal" hidden>
      <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="rankings-title">
        <header class="modal-header">
          <h2 id="rankings-title">Current Rankings</h2>
          <button id="close-modal" class="close-btn" type="button" aria-label="Close">×</button>
        </header>
        <ol class="rankings-list" id="rankings-list"></ol>
      </div>
    </div>
  </main>

  <script src="app.js" defer></script>
</body>
</html>
